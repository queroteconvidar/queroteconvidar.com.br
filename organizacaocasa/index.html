<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizador da Casa</title>
<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:0}
header{background:#ABC6BC;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.card{background:#fff;border-radius:10px;padding:15px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
h2{margin-top:0}
.checklist label{display:block;margin-bottom:8px}
textarea{width:100%;border-radius:8px;padding:10px;border:1px solid #ccc}
input[type="date"]{padding:8px;border-radius:8px;border:1px solid #ccc}
</style>
</head>
<body>
<header>
<h1>Organizador da Casa</h1>
</header><div class="container"><div class="card">
<h2>📅 Planejamento Semanal</h2>
<input type="date">
<textarea placeholder="Planejamento da semana..."></textarea>
</div><div class="card">
<h2>🍽️ Cardápio do Dia</h2>
<textarea placeholder="Café da manhã, almoço, jantar..."></textarea>
</div><div class="card">
<h2>🛋️ Sala</h2>
<div class="checklist">
<label><input type="checkbox"> Tirar pó dos móveis</label>
<label><input type="checkbox"> Limpar eletrônicos</label>
<label><input type="checkbox"> Aspirar sofá</label>
<label><input type="checkbox"> Passar pano no chão</label>
</div>
</div><div class="card">
<h2>🛏️ Quartos / Suítes</h2>
<div class="checklist">
<label><input type="checkbox"> Arrumar cama</label>
<label><input type="checkbox"> Trocar roupa de cama</label>
<label><input type="checkbox"> Tirar pó dos armários</label>
<label><input type="checkbox"> Limpar espelhos</label>
<label><input type="checkbox"> Passar pano no chão</label>
</div>
</div><div class="card">
<h2>🚿 Banheiros</h2>
<div class="checklist">
<label><input type="checkbox"> Limpar vaso sanitário</label>
<label><input type="checkbox"> Lavar pia</label>
<label><input type="checkbox"> Limpar espelho</label>
<label><input type="checkbox"> Lavar box</label>
<label><input type="checkbox"> Passar pano no chão</label>
</div>
</div><div class="card">
<h2>🍳 Cozinha</h2>
<div class="checklist">
<label><input type="checkbox"> Limpar fogão</label>
<label><input type="checkbox"> Limpar geladeira</label>
<label><input type="checkbox"> Lavar louça</label>
<label><input type="checkbox"> Tirar lixo</label>
<label><input type="checkbox"> Passar pano no chão</label>
</div>
</div><div class="card">
<h2>🧺 Área de Serviço</h2>
<div class="checklist">
<label><input type="checkbox"> Lavar roupas</label>
<label><input type="checkbox"> Estender roupas</label>
<label><input type="checkbox"> Limpar máquina</label>
<label><input type="checkbox"> Organizar produtos</label>
</div>
</div><div class="card">
<h2>🌿 Varanda</h2>
<div class="checklist">
<label><input type="checkbox"> Varrer chão</label>
<label><input type="checkbox"> Limpar móveis</label>
<label><input type="checkbox"> Regar plantas</label>
</div>
</div></div></body>
</html>
