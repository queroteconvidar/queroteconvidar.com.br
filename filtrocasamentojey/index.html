        .stage { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }

        #editorCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 7; background: #000; display: none; }

        #iosImageResult { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 20; display: none; pointer-events: auto; }
        #molduraImagePreview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: bottom; pointer-events: none; z-index: 15; display: none; }
        #canvasFinal { display: none; }

        /* ── Timer ── */
        #videoTimer {
            position: fixed;
            top: 18px;
            left: 50%;

            padding: 5px 18px;

        #convertScreen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.93);
            z-index: 200;
            display: none;

        #convertScreen .conv-title { font-size: 20px; font-weight: bold; color: #fff; }
        #convertScreen .conv-sub { font-size: 14px; color: #aaa; }
        #convertBar {
            width: 80%;
            max-width: 320px;

            background: #333;
            border-radius: 10px;

        }

            height: 100%;

        /* ── Botão inverter ── */
        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 30; display: flex; flex-direction: column; justify-content: flex-start; padding: 14px 16px; }
        .top-bar { display: flex; justify-content: flex-start; pointer-events: auto; }
        .btn-ui { padding: 10px 20px; background: rgba(0,0,0,0.6); border: 1px solid #fff; border-radius: 20px; color: #fff; cursor: pointer; backdrop-filter: blur(5px); }

        /* ── Loading boomerang ── */
        .boom-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 25px; border-radius: 20px; display: none; z-index: 100; border: 2px solid var(--boom); text-align: center; }

        /* ── Arte botões ── */
        #arteBotoes {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            pointer-events: none;
            z-index: 29;
            display: none;
        }

        /* ── Hotspots ── */
        .custom-controls-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;

        .btn-photo, .btn-boom, .btn-gallery, .btn-video {
            position: absolute;
            opacity: 0 !important;
            border: none !important;
            background: transparent !important;
            cursor: pointer;

            pointer-events: auto;
            transform: translate(-50%, -50%);
            border-radius: 50%;

            height: 14vw;

        /* ⬇️ AJUSTE AQUI conforme sua arte botoes.png */

        #captureVideoBtn { left: 87%; top: 62%; }

        /* ── Edição e resultado ── */
        #editUI { position: absolute; inset: 0; display: none; pointer-events: auto; flex-direction: column; justify-content: space-between; padding: 20px; z-index: 35; }
        #resultUI { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 50px; z-index: 40; background: rgba(0,0,0,0.85); }

<!-- FFmpeg.wasm via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.12.6/ffmpeg.min.js"></script>

<script>
// ==========================================
//   PAINEL DE CONTROLE - MUDE AQUI
// ==========================================
const CLIENTE = {
    nomeEvento:     "filtrocasamentojey",
    tituloPagina:   "filtrocasamentojey",
    arquivoMoldura: "moldura1.png",
    arquivoCapa:    "capajpg.jpg"
};
document.title = CLIENTE.tituloPagina;
document.getElementById('startScreen').style.backgroundImage = `url('${CLIENTE.arquivoCapa}')`;
// ==========================================

// ── FFmpeg setup ──
let ffmpegReady  = false;
let ffmpegLoading = false;
let ffmpegInstance = null;

async function loadFFmpeg() {
    if (ffmpegReady) return true;
    if (ffmpegLoading) return false;
    ffmpegLoading = true;
    try {
        const { FFmpeg } = FFmpegWASM;
        ffmpegInstance = new FFmpeg();
        ffmpegInstance.on('progress', ({ progress }) => {
            const pct = Math.round(progress * 100);
            document.getElementById('convertBarFill').style.width = pct + '%';
            document.getElementById('convertLog').innerText = `${pct}% concluído`;
        });
        ffmpegInstance.on('log', ({ message }) => {
            console.log('[ffmpeg]', message);
        });
        setConvertLog('Carregando conversor... (primeira vez pode demorar)');
        await ffmpegInstance.load({
            coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
            wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm',
        });
        ffmpegReady = true;
        ffmpegLoading = false;
        return true;
    } catch (e) {
        ffmpegLoading = false;
        console.error('FFmpeg load error:', e);
        return false;
    }
}

// Pré-carregar FFmpeg assim que a página abrir (em background)
window.addEventListener('load', () => {
    setTimeout(() => loadFFmpeg(), 2000);
});

// ── Converte blob webm → mp4 real ──
async function convertToMp4(inputBlob) {
    showConvertScreen('Convertendo para MP4...', 0);

    const ok = await loadFFmpeg();
    if (!ok) {
        // Se FFmpeg falhar, retorna o blob original com nome .mp4
        console.warn('FFmpeg indisponível, retornando webm com extensão mp4');
        hideConvertScreen();
        return { blob: inputBlob, fallback: true };
    }

    try {
        const { fetchFile } = FFmpegWASM;
        const inputName  = 'input.webm';
        const outputName = 'output.mp4';

        setConvertLog('Preparando arquivo...');
        await ffmpegInstance.writeFile(inputName, await fetchFile(inputBlob));

        setConvertLog('Convertendo...');
        await ffmpegInstance.exec([
            '-i', inputName,
            '-c:v', 'libx264',
            '-preset', 'ultrafast',
            '-crf', '28',
            '-c:a', 'aac',
            '-b:a', '128k',
            '-movflags', '+faststart',
            '-pix_fmt', 'yuv420p',
            outputName
        ]);

        setConvertLog('Finalizando...');
        const data = await ffmpegInstance.readFile(outputName);
        const mp4Blob = new Blob([data.buffer], { type: 'video/mp4' });

        // Limpeza
        try { await ffmpegInstance.deleteFile(inputName);  } catch(e){}
        try { await ffmpegInstance.deleteFile(outputName); } catch(e){}

        hideConvertScreen();
        return { blob: mp4Blob, fallback: false };
    } catch (e) {
        console.error('Conversão falhou:', e);
        hideConvertScreen();
        return { blob: inputBlob, fallback: true };
    }
}

function showConvertScreen(title, pct = 0) {
    document.getElementById('convertTitle').innerText = title;
    document.getElementById('convertBarFill').style.width = pct + '%';
    document.getElementById('convertLog').innerText = 'Aguarde...';
    document.getElementById('convertScreen').style.display = 'flex';
}
function hideConvertScreen() {
    document.getElementById('convertScreen').style.display = 'none';
}
function setConvertLog(msg) {
    document.getElementById('convertLog').innerText = msg;
}

// ── Estado global ──
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
let usingFrontCamera = true;
let stream            = null;
let isRecording       = false;
let mediaRecorder     = null;
let recordedChunks    = [];
let currentMimeType   = 'video/mp4';
let currentFileUrl    = null;
let boomFrames        = [];
let currentType       = 'image';
let recordStartTime, timerInterval;
const BOOM_CAPTURE_TIME = 1200;

let currentScale = 1, startDistance = 0, baseScale = 1;
let isEditingGallery = false;
let galleryImg = new Image();
let animId = null;
let galleryTransform = { x: 0, y: 0, sc: 1, lx: 0, ly: 0, ld: 0 };

// ── Referências DOM ──
const video          = document.getElementById('camera');
const canvasFinal    = document.getElementById('canvasFinal');
const videoPreview   = document.getElementById('videoPreview');
const iosImageResult = document.getElementById('iosImageResult');
const molduraImg     = document.getElementById('molduraImagePreview');
const editorCanvas   = document.getElementById('editorCanvas');
const eCtx           = editorCanvas.getContext('2d');
const ctxFinal       = canvasFinal.getContext('2d', { alpha: false });
const mainStage      = document.getElementById('mainStage');
const fileInput      = document.getElementById('fileInput');
const videoTimer     = document.getElementById('videoTimer');
const botoesWrapper  = document.getElementById('botoesWrapper');
const arteBotoes     = document.getElementById('arteBotoes');

// ── Eventos ──
document.getElementById('startBtn').onclick        = initCamera;
document.getElementById('switchBtn').onclick       = switchCamera;
document.getElementById('capturePhotoBtn').onclick = takePhoto;
document.getElementById('captureVideoBtn').onclick = () => isRecording ? stopRecording() : startRecording(false);
document.getElementById('boomerangBtn').onclick    = () => startRecording(true);
document.getElementById('newBtn').onclick          = resetAll;
document.getElementById('galleryBtn').onclick      = () => fileInput.click();
document.getElementById('cancelEditBtn').onclick   = resetAll;
document.getElementById('confirmEditBtn').onclick  = confirmGalleryEdit;

// ── Gestos ──
mainStage.addEventListener('touchstart', (e) => {
    if (isEditingGallery) {
        if (e.touches.length === 1) {
            galleryTransform.lx = e.touches[0].clientX - galleryTransform.x;
            galleryTransform.ly = e.touches[0].clientY - galleryTransform.y;
        } else if (e.touches.length === 2) {
            galleryTransform.ld = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
        }
    } else if (e.touches.length === 2) {
        startDistance = Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );
        baseScale = currentScale;
    }
});

mainStage.addEventListener('touchmove', (e) => {
    if (isEditingGallery) {
        e.preventDefault();
        if (e.touches.length === 1) {
            galleryTransform.x = e.touches[0].clientX - galleryTransform.lx;
            galleryTransform.y = e.touches[0].clientY - galleryTransform.ly;
        } else if (e.touches.length === 2) {
            const d = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            galleryTransform.sc *= (d / galleryTransform.ld);
            galleryTransform.ld = d;
        }
    } else if (e.touches.length === 2 && startDistance > 0) {
        const d = Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );
        currentScale = Math.min(Math.max(1, baseScale * (d / startDistance)), 4);
        video.style.transform = `${usingFrontCamera ? 'scaleX(-1)' : 'scaleX(1)'} scale(${currentScale})`;
    }
}, { passive: false });

// ── Câmera ──
async function initCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: usingFrontCamera ? 'user' : 'environment',
                width:  { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: true
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('cameraUI').style.display    = 'flex';
            botoesWrapper.style.display = 'block';
            arteBotoes.style.display    = 'block';
            molduraImg.src = CLIENTE.arquivoMoldura;
            molduraImg.style.display = 'block';
        };
    } catch (e) {
        alert("Câmera não disponível: " + e.message);
    }
}

function drawFrame(ctx, w, h) {
    ctx.save();
    if (usingFrontCamera) { ctx.translate(w, 0); ctx.scale(-1, 1); }
    ctx.translate(w / 2, h / 2);
    ctx.scale(currentScale, currentScale);
    ctx.translate(-w / 2, -h / 2);
    ctx.drawImage(video, 0, 0, w, h);
    ctx.restore();
    if (molduraImg.complete && molduraImg.naturalWidth > 0) {
        ctx.drawImage(molduraImg, 0, 0, w, h);
    }
}

// ── Compartilhar / Salvar ──
async function handleShare(url, type) {
    const extension = type === 'image' ? 'jpg' : 'mp4';
    const mimeType  = type === 'image' ? 'image/jpeg' : 'video/mp4';
    const fileName  = `registro_${Date.now()}.${extension}`;

    // iOS: tenta share sheet com arquivo
    if (isIOS) {
        let file = null;

        // try/catch separado no fetch — blob grande pode falhar por memória no Safari
        try {
            const response = await fetch(url);
            const blob     = await response.blob();
            file = new File([blob], fileName, { type: mimeType });
        } catch (fetchErr) {
            console.warn("Safari: falha ao ler blob (possível limite de memória):", fetchErr);
            // fetch falhou → vai direto para fallback manual
            showIOSFallback(url, type);
            return;
        }

        // try/catch separado no share — pode falhar no iOS 14 ou se canShare não suportar files
        if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({ files: [file], title: CLIENTE.nomeEvento });
            } catch (shareErr) {
                // AbortError = cliente fechou o Share Sheet sem escolher nada — ignorar
                if (shareErr.name !== 'AbortError') {
                    console.warn("Safari: share falhou:", shareErr);
                    showIOSFallback(url, type);
                }
            }
            return;
        }

        // iOS sem suporte a share com arquivos (iOS 14 ou anterior) → fallback manual
        showIOSFallback(url, type);
        return;
    }

    // Android e demais: download direto → salva na galeria automaticamente
    try {
        const a = document.createElement('a');
        a.href     = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    } catch (err) {
        console.error("Erro no download:", err);
    }
}

// ── Fallback iOS antigo: mostra mídia com instrução para segurar e salvar ──
function showIOSFallback(url, type) {
    const overlay = document.createElement('div');
    overlay.id = 'iosFallbackOverlay';
    overlay.style.cssText = `
        position: fixed; inset: 0; background: rgba(0,0,0,0.96);
        z-index: 999; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px; padding: 24px;
    `;

    const dica = type === 'image'
        ? '👆 Segure o dedo na imagem abaixo até aparecer o menu, depois toque em <strong>"Adicionar à Fotos"</strong>'
        : '👆 Toque nos 3 pontinhos do vídeo abaixo e escolha <strong>"Salvar vídeo"</strong>';

    const dicaBox = document.createElement('div');
    dicaBox.style.cssText = `
        background:#1a1a1a; border:2px solid #25D366; border-radius:16px;
        padding:18px 22px; text-align:center; max-width:320px;
    `;
    dicaBox.innerHTML = `
        <div style="font-size:28px; margin-bottom:8px;">📱</div>
        <div style="font-size:15px; line-height:1.6; color:#fff;">${dica}</div>
    `;
    overlay.appendChild(dicaBox);

    if (type === 'image') {
        const img = document.createElement('img');
        img.src = url;
        img.style.cssText = 'max-width:85vw; max-height:50vh; border-radius:12px; object-fit:contain;';
        overlay.appendChild(img);
    } else {
        const vid = document.createElement('video');
        vid.src      = url;
        vid.controls = true;
        vid.loop     = true;
        vid.setAttribute('playsinline', '');
        vid.style.cssText = 'max-width:85vw; max-height:50vh; border-radius:12px;';
        overlay.appendChild(vid);
        vid.play().catch(() => {});
    }

    const btnFechar = document.createElement('button');
    btnFechar.innerText = '✅ JÁ SALVEI — VOLTAR';
    btnFechar.style.cssText = `
        padding:16px 32px; background:#444; border:none; border-radius:14px;
        color:#fff; font-size:15px; font-weight:bold; cursor:pointer; width:85%;
    `;
    btnFechar.onclick = () => document.body.removeChild(overlay);
    overlay.appendChild(btnFechar);

    document.body.appendChild(overlay);
}

function showResult(url, type) {
    document.getElementById('resultUI').style.display = 'flex';
    document.getElementById('cameraUI').style.display = 'none';
    botoesWrapper.style.display = 'none';
    arteBotoes.style.display    = 'none';
    currentType    = type;
    currentFileUrl = url;

    if (type === 'image') {
        iosImageResult.src = url;
        iosImageResult.style.display = 'block';
        videoPreview.style.display   = 'none';
    } else {
        iosImageResult.style.display = 'none';
        videoPreview.style.display   = 'block';
        videoPreview.src = url;
        videoPreview.play().catch(() => {});
    }

    const downloadBtn = document.getElementById('downloadBtn');
    downloadBtn.innerText = isIOS ? '📤 COMPARTILHAR / SALVAR' : '💾 SALVAR NA GALERIA';
    downloadBtn.onclick = () => handleShare(currentFileUrl, currentType);
}

// ── Foto ──
function takePhoto() {
    canvasFinal.width  = 1080;
    canvasFinal.height = 1920;
    drawFrame(ctxFinal, 1080, 1920);
    showResult(canvasFinal.toDataURL('image/jpeg', 0.95), 'image');
}

// ── Gravação de vídeo ──
function startRecording(isBoom) {
    isRecording    = true;
    recordedChunks = [];
    boomFrames     = [];

    if (isBoom) {
        captureBoomerang(Date.now());
        return;
    }

    startTimer();

    canvasFinal.width  = 720;
    canvasFinal.height = 1280;

    const canvasStream = canvasFinal.captureStream(30);

    // Áudio: direto sem AudioContext (compatível iOS)
    try {
        const audioTracks = stream ? stream.getAudioTracks() : [];
        if (audioTracks.length > 0) canvasStream.addTrack(audioTracks[0]);
    } catch (e) { console.warn("Áudio não adicionado:", e); }

    // Melhor formato disponível para gravação (webm tem melhor suporte)
    const formats = [
        'video/webm;codecs=vp8,opus',
        'video/webm;codecs=vp9,opus',
        'video/webm',
        'video/mp4'
    ];
    currentMimeType = formats.find(f => {
        try { return MediaRecorder.isTypeSupported(f); } catch(e) { return false; }
    }) || '';

    try {
        mediaRecorder = currentMimeType
            ? new MediaRecorder(canvasStream, { mimeType: currentMimeType })
            : new MediaRecorder(canvasStream);
    } catch (e) {
        mediaRecorder = new MediaRecorder(canvasStream);
        currentMimeType = '';
    }

    mediaRecorder.ondataavailable = e => {
        if (e.data && e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
        const rawBlob = new Blob(recordedChunks, { type: currentMimeType || 'video/webm' });
        const { blob: mp4Blob, fallback } = await convertToMp4(rawBlob);
        if (fallback) {
            console.warn('Usando arquivo sem conversão real');
        }
        showResult(URL.createObjectURL(mp4Blob), 'video');
    };

    mediaRecorder.start(100);

    const loop = () => {
        if (isRecording) {
            drawFrame(ctxFinal, 720, 1280);
            requestAnimationFrame(loop);
        }
    };
    loop();
}

function stopRecording() {
    if (!isRecording) return;
    isRecording = false;
    stopTimer();
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
    }
}

// ── Boomerang ──
function captureBoomerang(startTime) {
    const interval = setInterval(() => {
        if (Date.now() - startTime >= BOOM_CAPTURE_TIME) {
            clearInterval(interval);
            processBoomerang();
        } else {
            const fCanvas = document.createElement('canvas');
            fCanvas.width  = 720;
            fCanvas.height = 1280;
            const fCtx = fCanvas.getContext('2d');
            if (usingFrontCamera) { fCtx.translate(720, 0); fCtx.scale(-1, 1); }
            fCtx.drawImage(video, 0, 0, 720, 1280);
            if (usingFrontCamera) fCtx.setTransform(1,0,0,1,0,0);
            if (molduraImg.complete && molduraImg.naturalWidth > 0) {
                fCtx.drawImage(molduraImg, 0, 0, 720, 1280);
            }
            boomFrames.push(fCanvas);
        }
    }, 40);
}

async function processBoomerang() {
    document.getElementById('boomLoading').style.display = 'block';
    recordedChunks = [];

    const pingPong      = [...boomFrames, ...[...boomFrames].reverse()];
    const finalSequence = [...pingPong, ...pingPong];

    canvasFinal.width  = 720;
    canvasFinal.height = 1280;

    const streamBoom = canvasFinal.captureStream(30);
    const boomMimeRec = MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
        ? 'video/webm;codecs=vp8,opus'
        : 'video/webm';

    let rec;
    try {
        rec = new MediaRecorder(streamBoom, { mimeType: boomMimeRec });
    } catch (e) {
        rec = new MediaRecorder(streamBoom);
    }

    rec.ondataavailable = e => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };

    rec.onstop = async () => {
        document.getElementById('boomLoading').style.display = 'none';
        const rawBlob = new Blob(recordedChunks, { type: boomMimeRec });
        const { blob: mp4Blob } = await convertToMp4(rawBlob);
        showResult(URL.createObjectURL(mp4Blob), 'video');
    };

    rec.start();

    let idx = 0;
    const playInterval = setInterval(() => {
        if (idx >= finalSequence.length) {
            clearInterval(playInterval);
            rec.stop();
        } else {
            ctxFinal.drawImage(finalSequence[idx], 0, 0, 720, 1280);
            idx++;
        }
    }, 33);
}

// ── Galeria ──
fileInput.onchange = e => {
    if (!e.target.files[0]) return;
    const reader = new FileReader();
    reader.onload = ev => {
        galleryImg = new Image();
        galleryImg.onload = () => {
            isEditingGallery = true;
            document.getElementById('cameraUI').style.display = 'none';
            botoesWrapper.style.display = 'none';
            arteBotoes.style.display    = 'none';
            document.getElementById('editUI').style.display   = 'flex';
            editorCanvas.style.display = 'block';
            editorCanvas.width  = window.innerWidth;
            editorCanvas.height = window.innerHeight;
            const ratio = Math.min(
                editorCanvas.width  / galleryImg.width,
                editorCanvas.height / galleryImg.height
            );
            galleryTransform.sc = ratio;
            galleryTransform.x  = (editorCanvas.width  - galleryImg.width  * ratio) / 2;
            galleryTransform.y  = (editorCanvas.height - galleryImg.height * ratio) / 2;
            renderEditor();
        };
        galleryImg.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

function renderEditor() {
    if (!isEditingGallery) return;
    eCtx.fillStyle = "#000";
    eCtx.fillRect(0, 0, editorCanvas.width, editorCanvas.height);
    eCtx.save();
    eCtx.translate(galleryTransform.x, galleryTransform.y);
    eCtx.scale(galleryTransform.sc, galleryTransform.sc);
    eCtx.drawImage(galleryImg, 0, 0);
    eCtx.restore();
    if (molduraImg.complete && molduraImg.naturalWidth > 0) {
        eCtx.drawImage(molduraImg, 0, 0, editorCanvas.width, editorCanvas.height);
    }
    animId = requestAnimationFrame(renderEditor);
}

function confirmGalleryEdit() {
    isEditingGallery = false;
    cancelAnimationFrame(animId);
    canvasFinal.width  = 1080;
    canvasFinal.height = 1920;
    const s = 1080 / editorCanvas.width;
    ctxFinal.save();
    ctxFinal.translate(galleryTransform.x * s, galleryTransform.y * s);
    ctxFinal.scale(galleryTransform.sc * s, galleryTransform.sc * s);
    ctxFinal.drawImage(galleryImg, 0, 0);
    ctxFinal.restore();
    if (molduraImg.complete && molduraImg.naturalWidth > 0) {
        ctxFinal.drawImage(molduraImg, 0, 0, 1080, 1920);
    }
    editorCanvas.style.display = 'none';
    showResult(canvasFinal.toDataURL('image/jpeg', 0.95), 'image');
}

// ── Reset ──
function resetAll() {
    isEditingGallery = false;
    if (animId) cancelAnimationFrame(animId);
    isRecording = false;
    stopTimer();
    videoPreview.pause();
    videoPreview.src             = "";
    videoPreview.style.display   = 'none';
    iosImageResult.style.display = 'none';
    document.getElementById('resultUI').style.display = 'none';
    document.getElementById('editUI').style.display   = 'none';
    editorCanvas.style.display = 'none';
    document.getElementById('cameraUI').style.display = 'flex';
    botoesWrapper.style.display = 'block';
    arteBotoes.style.display    = 'block';
    fileInput.value = "";
}

// ── Timer ──
function startTimer() {
    videoTimer.style.display = 'block';
    recordStartTime = Date.now();
    timerInterval = setInterval(() => {
        const s  = Math.floor((Date.now() - recordStartTime) / 1000);
        const mm = Math.floor(s / 60).toString().padStart(2, '0');
        const ss = (s % 60).toString().padStart(2, '0');
        videoTimer.innerText = `⏺ ${mm}:${ss}`;
    }, 500);
}
function stopTimer() {
    clearInterval(timerInterval);
    videoTimer.style.display = 'none';
    videoTimer.innerText     = '⏺ 00:00';
}

function switchCamera() {
    usingFrontCamera = !usingFrontCamera;
    currentScale = 1;
    initCamera();
}
</script>
