<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Briefing Premium | 15 Anos | Quero Convidar</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond&family=Montserrat&display=swap" rel="stylesheet">

<style>
body {font-family: 'Montserrat', sans-serif; background:#f8f4ef; margin:0;}
.container {max-width:900px;margin:auto;padding:20px;}
.section-card {background:#fff;padding:20px;border-radius:20px;margin-bottom:20px;}
h1,h2 {font-family:'Cormorant Garamond', serif;}
input,textarea,select {width:100%;padding:12px;margin-top:5px;border-radius:10px;border:1px solid #ccc;}
button {padding:14px;border:none;border-radius:50px;cursor:pointer;}
.btn-primary {background:#a68a74;color:#fff;}
.btn-secondary {background:#eee;}
</style>
</head>

<body>
<div class="container">

<h1>Briefing Premium 15 Anos</h1>

<form id="briefingForm">

<!-- SEÇÃO 1 -->
<div class="section-card">
<h2>Informações principais</h2>

<label>Nome da debutante</label>
<input id="nomeDebutante" required>

<label>Nome do responsável</label>
<input id="nomeResponsavel" required>

<label>WhatsApp</label>
<input id="whatsCliente" required>

<label>Instagram</label>
<input id="instagramCliente">

<label>Data do evento</label>
<input type="date" id="dataEvento" required>

<label>Horário</label>
<input type="time" id="horarioEvento" required>

<label>Nome do local</label>
<input id="nomeEspaco" required>

<label>Cidade</label>
<input id="cidadeEvento">

<label>Endereço</label>
<textarea id="enderecoCompleto"></textarea>

<label>Link localização</label>
<input id="linkLocalizacao">
</div>

<!-- SEÇÃO 2 -->
<div class="section-card">
<h2>Conceito visual</h2>

<label>Tema</label>
<input id="temaEvento">

<label>Estilo</label>
<select id="estiloVisual">
<option></option>
<option>Clássico</option>
<option>Romântico</option>
<option>Luxuoso</option>
</select>

<label>Paleta</label>
<input id="paletaCores">

<label>Elementos</label>
<input id="elementosVisuais">

<label>Referências</label>
<textarea id="referenciasVisuais"></textarea>

<label>O que não quer</label>
<textarea id="naoQuer"></textarea>
</div>

<!-- SEÇÃO 4 -->
<div class="section-card">
<h2>Informações do convite</h2>

<label>Frase</label>
<textarea id="fraseVersiculo"></textarea>

<label>Pais</label>
<input id="nomesPais">

<label>Traje</label>
<input id="dressCode">

<label>Informações obrigatórias</label>
<textarea id="infoObrigatorias"></textarea>

<label>Confirmação</label>
<input id="confirmacaoLink">

<label>Site</label>
<input id="siteEvento">

<label>Presentes</label>
<textarea id="presentesInfo"></textarea>
</div>

<!-- TERMO -->
<div class="section-card">
<h2>Termo</h2>

<label>
<input type="checkbox" id="aceiteContrato" required>
Li e concordo
</label>

<br><br>

<button type="submit" class="btn-primary">Enviar</button>
<button type="reset" class="btn-secondary">Limpar</button>

</div>

</form>
</div>

<script>
function v(id){
let el=document.getElementById(id);
return el&&el.value?el.value:"Não informado";
}

document.getElementById("briefingForm").addEventListener("submit",function(e){
e.preventDefault();

if(!document.getElementById("aceiteContrato").checked){
alert("Aceite o contrato");
return;
}

let msg=`Olá! 💌

✨ INFORMAÇÕES
Nome: ${v('nomeDebutante')}
Responsável: ${v('nomeResponsavel')}
Whats: ${v('whatsCliente')}
Instagram: ${v('instagramCliente')}
Data: ${v('dataEvento')}
Hora: ${v('horarioEvento')}
Local: ${v('nomeEspaco')}
Cidade: ${v('cidadeEvento')}

🎨 CONCEITO
Tema: ${v('temaEvento')}
Estilo: ${v('estiloVisual')}
Paleta: ${v('paletaCores')}
Elementos: ${v('elementosVisuais')}

📌 CONVITE
Frase: ${v('fraseVersiculo')}
Pais: ${v('nomesPais')}
Traje: ${v('dressCode')}
Confirmação: ${v('confirmacaoLink')}

📄 TERMO
Aceito`;

window.open(`https://wa.me/5521967647527?text=${encodeURIComponent(msg)}`);
});
</script>

</body>
</html>
